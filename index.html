<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Home • The Core Room</title>
  <meta name="description" content="The Core Room — Reformer Pilates • Mat Pilates • Yoga • Barre" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>

<body>

<!-- ===== PRELAUNCH OVERLAY ===== -->
<div id="prelaunch">
  <div class="prelaunch-inner">

    <img src="/assets/core-room-logo.png" alt="The Core Room" />

    <h1>Opening Soon</h1>
    <p>A calm, focused studio experience for reformer, mat, and movement.</p>

    <form id="emailForm">
      <input type="text" name="name" placeholder="Your name" required />
      <input type="email" name="email" placeholder="Your email" required />
      <input type="tel" name="phone" placeholder="Phone number" required />
      <button type="submit">Notify Me</button>
    </form>

    <p id="status"></p>

  </div>
</div>

<style>
#prelaunch {
  position: fixed;
  inset: 0;
  background: #ead9c9;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.prelaunch-inner {
  text-align: center;
  max-width: 420px;
}

.prelaunch-inner img {
  width: 130px;
  margin-bottom: 20px;
}

.prelaunch-inner h1 {
  color: #4a2a1d;
  margin-bottom: 10px;
}

.prelaunch-inner p {
  color: #6a5f57;
  margin-bottom: 20px;
}

#emailForm {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

#emailForm input {
  padding: 12px;
  border-radius: 999px;
  border: 1px solid rgba(0,0,0,0.1);
}

#emailForm button {
  margin-top: 5px;
  padding: 12px;
  border-radius: 999px;
  border: none;
  background: #4a2a1d;
  color: #fff;
  cursor: pointer;
}
</style>

<script>
document.getElementById('emailForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const form = e.target;

  const name = form.name.value.trim();
  const email = form.email.value.trim();
  let phone = form.phone.value.trim();

  const status = document.getElementById('status');
  status.textContent = '';

  // 🔒 VALIDATION

  if (!name) {
    status.textContent = 'Enter your name.';
    return;
  }

  if (!email || !email.includes('@')) {
    status.textContent = 'Enter a valid email.';
    return;
  }

  // remove everything except digits
  phone = phone.replace(/\D/g, '');

  if (phone.length !== 10) {
    status.textContent = 'Enter a valid 10-digit phone number.';
    return;
  }

  const payload = {
    name,
    email,
    phone
  };

  status.textContent = 'Submitting...';

  try {
    const res = await fetch('/api/collect-emails', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (res.ok) {
      status.textContent = data.message || 'You’re on the list.';
      form.reset();
    } else {
      status.textContent = data.error || 'Something went wrong.';
    }

  } catch {
    status.textContent = 'Error submitting.';
  }
});
</script>

</body>
</html>
